services:
  db:
    image: postgres:17.6-alpine
    container_name: tts_db_prod
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      target: production
    container_name: tts_server_prod
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db

  client:
    build:
      context: ./client
      target: production
    container_name: tts_client_prod
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata_prod: